name: Build and Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/junhyung17/wine-note:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/junhyung17/wine-note-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}

  update-manifest:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: junhyung17/wine-manifest
          token: ${{ secrets.MANIFEST_TOKEN }}
          path: wine-manifest
      - name: Update deployed-sha annotation
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::7}"
          sed -i "s|deployed-sha: .*|deployed-sha: \"${SHORT}\"|g" wine-manifest/django/deployment.yaml
          sed -i "s|deployed-sha: .*|deployed-sha: \"${SHORT}\"|g" wine-manifest/react/deployment.yaml
      - name: Commit and push
        run: |
          cd wine-manifest
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add django/deployment.yaml react/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: wine-note ${{ github.sha }}"
          git push
